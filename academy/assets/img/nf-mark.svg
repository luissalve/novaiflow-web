<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="128" height="128" role="img" aria-label="NovAIFlow symbol">
  <title>NovAIFlow — Convergence Node (full colour, for dark surfaces)</title>
  <desc>Five service-line edges converge into one bright Nova node, then one outbound edge flows out: many systems in, one flow of value out.</desc>
  <defs>
    <linearGradient id="nfFlow" gradientUnits="userSpaceOnUse" x1="9" y1="50" x2="57" y2="38">
      <stop offset="0" stop-color="#18C8E6"/>
      <stop offset="1" stop-color="#5B4BDB"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- converging mesh edges (4 of the 5 service lines) -->
    <g stroke="#475569" stroke-width="3.5">
      <path d="M9 36 L42 22"/>
      <path d="M9 22 L42 22"/>
      <path d="M14 10 L42 22"/>
      <path d="M28 8 L42 22"/>
    </g>
    <!-- hero path: longest incoming edge + the outbound flow of value -->
    <path d="M9 50 L42 22 L57 40" stroke="url(#nfFlow)" stroke-width="4.5"/>
    <!-- outbound arrowhead -->
    <path d="M57 40 L56.5 34 M57 40 L51.2 38.4" stroke="#5B4BDB" stroke-width="4.5"/>
  </g>
  <!-- origin nodes -->
  <g fill="#475569">
    <circle cx="9" cy="50" r="3.2"/>
    <circle cx="9" cy="36" r="3.2"/>
    <circle cx="9" cy="22" r="3.2"/>
    <circle cx="14" cy="10" r="3.2"/>
    <circle cx="28" cy="8" r="3.2"/>
  </g>
  <!-- the Nova: lit convergence node (warm cue + flat halo, no blur) -->
  <circle cx="42" cy="22" r="9.5" fill="none" stroke="#FFB23E" stroke-width="1.2" opacity="0.35"/>
  <circle cx="42" cy="22" r="6.5" fill="#FFB23E"/>
  <circle cx="42" cy="22" r="2.4" fill="#FFE0A8"/>
</svg>
